<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screan - App Store & Google Play Screenshot Studio</title>
    <meta name="description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android. Add titles, customize colors, and export all formats at once.">
    <meta name="keywords" content="App Store, Google Play, screenshots, iPhone, iPad, Mac, Android, marketing, ASO">
    <meta name="author" content="Screan">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta property="og:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">
    <meta property="og:site_name" content="Screan">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta name="twitter:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Theme Color -->
    <meta name="theme-color" content="#75B7E7">

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@100;400;500;600;700&family=DM+Sans:wght@100;400;500;600;700&family=IBM+Plex+Serif:wght@100;400;500;600;700&family=Inter:wght@100;400;500;600;700&family=Montserrat:wght@100;400;500;600;700&family=Nunito+Sans:wght@100;400;500;600;700&family=Outfit:wght@100;400;500;600;700&family=Poppins:wght@100;400;500;600;700&family=Raleway:wght@100;400;500;600;700&family=Roboto:wght@100;400;500;600;700&family=Work+Sans:wght@100;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app">
        <!-- Mini Sidebar (Icons) -->
        <aside class="mini-sidebar">
            <div class="mini-sidebar-top">
                <button class="mini-sidebar-btn" id="togglePanels" title="Toggle panels">
                    <i data-lucide="columns-3"></i>
                </button>
                <button class="mini-sidebar-btn" id="themeToggle" title="Toggle theme">
                    <i data-lucide="moon" class="icon-moon"></i>
                    <i data-lucide="sun" class="icon-sun"></i>
                </button>
            </div>
            <div class="mini-sidebar-bottom">
                <a href="https://buymeacoffee.com/patricecassard" target="_blank" rel="noopener" class="mini-sidebar-btn" title="Buy me a coffee">
                    <i data-lucide="coffee"></i>
                </a>
                <a href="https://x.com/patricecassard" target="_blank" rel="noopener" class="mini-sidebar-btn" title="Follow on X">
                    <i data-lucide="twitter"></i>
                </a>
                <a href="https://github.com/cassardp/Screan#readme" target="_blank" rel="noopener" class="mini-sidebar-btn" title="View on GitHub">
                    <i data-lucide="github"></i>
                </a>
                <span class="version-number">0.95</span>
            </div>
        </aside>

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo_dark.png" alt="Screan" class="app-logo logo-dark">
                <img src="assets/logo_light.png" alt="Screan" class="app-logo logo-light">
            </div>

            <nav class="sidebar-nav">
                <div class="projects-header">
                    <span class="projects-title">Projects</span>
                    <button class="projects-add-btn" id="addProjectBtn" title="New project">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <div class="projects-list" id="projectsList">
                    <!-- Generated dynamically -->
                </div>
            </nav>

            <!-- Project context menu -->
            <div class="project-menu" id="projectMenu" style="display: none;">
                <button data-action="rename"><i data-lucide="pencil"></i> Rename</button>
                <button data-action="duplicate"><i data-lucide="copy"></i> Duplicate</button>
                <button data-action="delete" class="danger"><i data-lucide="trash-2"></i> Delete</button>
            </div>

            <div class="sidebar-bottom">
                <div class="platforms-section" id="platformsSection">
                    <button class="platforms-toggle" id="platformsToggle">
                        <span>Platforms</span>
                        <i data-lucide="chevron-up"></i>
                    </button>
                    <div class="active-platform-preview" id="activePlatformPreview">
                        <span class="active-platform-name" id="activePlatformName">iPhone</span>
                        <span class="active-platform-count" id="activePlatformCount" style="display: none;">0</span>
                    </div>
                    <div class="platforms-list" id="platformsList">
                        <div class="nav-section" id="appStoreSection">
                            <div class="nav-section-title">App Store</div>
                        </div>
                        <div class="nav-section" id="googlePlaySection">
                            <div class="nav-section-title">Google Play</div>
                        </div>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <button class="btn-export" id="exportBtn" disabled>
                        <i data-lucide="download"></i>
                        Export
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-content">
            <!-- Toolbar -->
            <header class="main-toolbar">
                <div class="toolbar-left">
                    <button class="add-screenshot-btn" id="addScreenshotBtn">
                        <input type="file" id="screenshotInput" multiple accept="image/*" hidden>
                        <i data-lucide="plus"></i>
                        Add Screenshots
                    </button>
                    <button class="toolbar-icon-btn" id="undoBtn" title="Undo (Cmd+Z)" style="display:none">
                        <i data-lucide="undo-2"></i>
                    </button>
                </div>
                <div class="toolbar-right">
                    <select id="formatSelect" class="format-select">
                        <!-- Options generated dynamically: platforms with screenshots -->
                    </select>
                    <select id="previewLanguageSelect" class="preview-language-select">
                        <!-- Options synced with languageSelect, visible only when panels hidden -->
                    </select>
                </div>
            </header>

            <!-- Zone des previews multiples -->
            <div class="previews-wrapper">
                <div class="previews-container" id="previewsContainer">
                    <!-- Canvases will be generated dynamically -->
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-spinner"></div>
                        <p id="emptyStateText">Drag & drop iPhone screenshots here</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="settings-panel">
            <!-- Settings Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="content">
                    <i data-lucide="type"></i>
                    <span class="tab-label">Content</span>
                </button>
                <button class="settings-tab" data-tab="style">
                    <i data-lucide="paintbrush-vertical"></i>
                    <span class="tab-label">Design</span>
                </button>
                <button class="settings-tab" data-tab="localize">
                    <i data-lucide="languages"></i>
                    <span class="tab-label">Translate</span>
                </button>
            </div>

            <div class="settings-scroll">
                <!-- Content Tab -->
                <div class="settings-tab-content active" id="contentTab">
                    <!-- Layout -->
                    <section class="settings-section" id="textLayoutSection">
                        <div class="section-header">
                            <span class="section-title">Layout</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="layout" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="setting-row" id="alignRow">
                                <span class="setting-label">Text align</span>
                                <div class="align-buttons btn-group" id="alignButtons">
                                    <button class="align-btn btn-group-item" data-align="left" title="Align left">
                                        <i data-lucide="align-left"></i>
                                    </button>
                                    <button class="align-btn btn-group-item active" data-align="center" title="Align center">
                                        <i data-lucide="align-center"></i>
                                    </button>
                                    <button class="align-btn btn-group-item" data-align="right" title="Align right">
                                        <i data-lucide="align-right"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="setting-row" id="textGapRow">
                                <span class="setting-label">Gap</span>
                                <div class="slider-row">
                                    <div class="slider-track-wrap">
                                        <input type="range" id="textGapSlider" class="range-slider" min="0" max="100" value="35" step="1">
                                    </div>
                                    <span class="slider-value" id="textGapValue">35</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Title -->
                    <section class="settings-section" id="titleSection">
                        <div class="section-header">
                            <span class="section-title">Title</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="title" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <textarea id="headline" class="text-input title-area" placeholder="Enter title..." rows="2"></textarea>
                            <div class="text-options-row">
                                <select id="titleFont" class="font-select"></select>
                                <select id="titleWeight" class="font-select">
                                    <option value="thin">Thin</option>
                                    <option value="regular">Regular</option>
                                    <option value="medium">Medium</option>
                                    <option value="semibold">Semi-bold</option>
                                    <option value="bold" selected>Bold</option>
                                </select>
                                <button class="uppercase-btn" id="titleUppercase" title="Uppercase">
                                    <i data-lucide="case-sensitive" class="icon-mixed"></i>
                                    <i data-lucide="case-upper" class="icon-uppercase"></i>
                                </button>
                            </div>
                            <div class="text-options-row">
                                <div class="size-input-wrap">
                                    <select id="titleSizeSelect" class="size-select">
                                        <option value="90">S</option>
                                        <option value="120" selected>M</option>
                                        <option value="132">L</option>
                                        <option value="160">XL</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                    <input type="number" id="titleSizeInput" class="size-input" value="120" min="1" step="1">
                                </div>
                                <div class="color-input-wrap">
                                    <input type="color" id="titleColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="titleColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Body -->
                    <section class="settings-section" id="bodySection">
                        <div class="section-header">
                            <span class="section-title">Body</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="body" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <textarea id="subheadline" class="text-input text-area" placeholder="Enter subtitle..." rows="2"></textarea>
                            <div class="text-options-row">
                                <select id="bodyFont" class="font-select"></select>
                                <select id="bodyWeight" class="font-select">
                                    <option value="thin">Thin</option>
                                    <option value="regular">Regular</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="semibold">Semi-bold</option>
                                    <option value="bold">Bold</option>
                                </select>
                                <button class="uppercase-btn" id="bodyUppercase" title="Uppercase">
                                    <i data-lucide="case-sensitive" class="icon-mixed"></i>
                                    <i data-lucide="case-upper" class="icon-uppercase"></i>
                                </button>
                            </div>
                            <div class="text-options-row">
                                <div class="size-input-wrap">
                                    <select id="bodySizeSelect" class="size-select">
                                        <option value="60">S</option>
                                        <option value="72" selected>M</option>
                                        <option value="80">L</option>
                                        <option value="96">XL</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                    <input type="number" id="bodySizeInput" class="size-input" value="72" min="1" step="1">
                                </div>
                                <div class="color-input-wrap">
                                    <input type="color" id="bodyColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="bodyColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Style Tab -->
                <div class="settings-tab-content" id="styleTab">
                    <!-- Screenshot -->
                    <section class="settings-section" id="deviceFrameSection">
                        <div class="section-header">
                            <span class="section-title">Screenshot</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="device" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="setting-row" id="positionRow">
                                <span class="setting-label">Position</span>
                                <div class="position-text-buttons btn-group">
                                    <button class="position-text-btn btn-group-item" data-preset="bottom" title="Top">
                                        <i data-lucide="arrow-up-to-line"></i>
                                    </button>
                                    <button class="position-text-btn btn-group-item" data-preset="center" title="Center">
                                        <i data-lucide="rectangle-vertical"></i>
                                    </button>
                                    <button class="position-text-btn btn-group-item active" data-preset="top" title="Bottom">
                                        <i data-lucide="arrow-down-to-line"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="setting-row" id="screenshotOffsetXRow">
                                <span class="setting-label">Offset X</span>
                                <div class="slider-row">
                                    <div class="slider-track-wrap">
                                        <input type="range" id="screenshotOffsetXSlider" class="range-slider" min="-50" max="50" value="0" step="1">
                                    </div>
                                    <span class="slider-value" id="screenshotOffsetXValue">0</span>
                                </div>
                            </div>
                            <div class="setting-row" id="screenshotOffsetYRow">
                                <span class="setting-label">Offset Y</span>
                                <div class="slider-row">
                                    <div class="slider-track-wrap">
                                        <input type="range" id="screenshotOffsetYSlider" class="range-slider" min="0" max="100" value="33" step="1">
                                    </div>
                                    <span class="slider-value" id="screenshotOffsetYValue">33</span>
                                </div>
                            </div>
                            <div class="setting-row" id="screenshotRotationRow">
                                <span class="setting-label">Rotation</span>
                                <div class="slider-row">
                                    <div class="slider-track-wrap">
                                        <input type="range" id="screenshotRotationSlider" class="range-slider" min="-45" max="45" value="0" step="1">
                                    </div>
                                    <span class="slider-value" id="screenshotRotationValue">0</span>
                                </div>
                            </div>
                            <div class="setting-row" id="showBorderRow">
                                <label class="setting-label">Border</label>
                                <label class="toggle">
                                    <input type="checkbox" id="addDeviceFrame" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-row" id="deviceFrameColorRow">
                                <label class="setting-label">Color</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="deviceFrameColor" value="#000000">
                                    <input type="text" class="color-hex-input" id="deviceFrameColorHex" value="#000000" maxlength="7">
                                </div>
                            </div>
                            <div class="setting-row" id="displayShadowRow">
                                <label class="setting-label">Shadow</label>
                                <label class="toggle">
                                    <input type="checkbox" id="addShadow">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-row" id="hideScreenshotRow">
                                <label class="setting-label">Visible</label>
                                <label class="toggle">
                                    <input type="checkbox" id="hideScreenshot" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </section>

                    <!-- Background -->
                    <section class="settings-section" id="backgroundSection">
                        <div class="section-header">
                            <span class="section-title">Background</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="background" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="setting-row">
                                <label class="setting-label">Gradient</label>
                                <label class="toggle">
                                    <input type="checkbox" id="bgGradient">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="setting-row">
                                <label class="setting-label" id="bgColorLabel">Color</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="bgColor1" value="#75B7E7">
                                    <input type="text" class="color-hex-input" id="bgColor1Hex" value="#75B7E7" maxlength="7">
                                </div>
                            </div>
                            <div class="setting-row" id="gradientColorRow" style="display: none;">
                                <label class="setting-label">End</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="bgGradientColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="bgGradientColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                            <div class="setting-row" id="gradientAngleRow" style="display: none;">
                                <label class="setting-label">Angle</label>
                                <div class="slider-row">
                                    <div class="slider-track-wrap">
                                        <input type="range" id="bgGradientAngleSlider" class="range-slider" min="0" max="360" value="180" step="1">
                                    </div>
                                    <span class="slider-value" id="bgGradientAngleValue">180</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Localize Tab -->
                <div class="settings-tab-content" id="localizeTab">
                    <section class="settings-section" id="translationSection">
                        <div class="section-header section-header-toggle" id="apiKeyHeader">
                            <span class="section-title">Claude API Key</span>
                            <i data-lucide="chevron-down" class="section-chevron"></i>
                        </div>
                        <div class="section-content section-collapsible" id="apiKeyContent">
                            <div class="setting-row" id="apiKeyRow">
                                <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Stays on your device">
                                <button class="api-key-toggle icon-btn" id="apiKeyToggle" type="button" title="Show/Hide API key">
                                    <i data-lucide="eye" class="icon-show"></i>
                                    <i data-lucide="eye-off" class="icon-hide"></i>
                                </button>
                            </div>
                            <div class="setting-row" id="modelRow">
                                <select id="modelSelect" class="font-select" disabled>
                                    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section class="settings-section" id="languageSection">
                        <div class="section-header">
                            <span class="section-title">Languages</span>
                        </div>
                        <div class="section-content">
                            <div class="language-list" id="activeLanguages">
                                <!-- Populated dynamically by localize.js -->
                            </div>
                        </div>
                    </section>

                    <section class="settings-section" id="addLanguageSection">
                        <div class="section-header">
                            <span class="section-title">Add language</span>
                        </div>
                        <div class="section-content">
                            <div class="setting-row" id="addLanguageRow">
                                <select id="availableLanguagesSelect" class="font-select">
                                    <!-- Populated dynamically by localize.js -->
                                </select>
                                <button class="add-lang-btn icon-btn" id="addLangBtn" title="Add">
                                    <i data-lucide="plus"></i>
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Hidden select for preview toolbar sync -->
                    <select id="languageSelect" class="font-select language-select" style="display: none;">
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <!-- Footer Buttons -->
            <div class="settings-footer" id="translateFooter" style="display: none;">
                <button class="btn-apply-all" id="translateAllBtn" disabled>
                    <i data-lucide="wand-sparkles"></i>
                    Translate All
                </button>
            </div>
        </aside>
    </div>

    <!-- Progress Modal -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <div class="spinner"></div>
            <p class="modal-text" id="progressText">Exporting...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/render.js"></script>
    <script src="js/screenshots.js"></script>
    <script src="js/reorder.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/export.js"></script>
    <script src="js/localize.js"></script>
    <script src="js/ai-translate.js"></script>
    <script src="js/events.js"></script>
    <script src="js/undo.js"></script>
    <script src="app.js"></script>

    <!-- Vercel Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
