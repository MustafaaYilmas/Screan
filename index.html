<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screan - App Store & Google Play Screenshot Studio</title>
    <meta name="description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android. Add titles, customize colors, and export all formats at once.">
    <meta name="keywords" content="App Store, Google Play, screenshots, iPhone, iPad, Mac, Android, marketing, ASO">
    <meta name="author" content="Screan">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta property="og:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">
    <meta property="og:site_name" content="Screan">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta name="twitter:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Theme Color -->
    <meta name="theme-color" content="#75B7E7">

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="app-name">Screan.app</span>
                <div class="header-actions">
                    <a href="https://github.com/cassardp/Screan#readme" target="_blank" rel="noopener" class="help-link" title="View on GitHub">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
                            <path d="M9 18c-4.51 2-5-2-7-2"/>
                        </svg>
                    </a>
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    </button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- Apple App Store -->
                <div class="nav-section">
                    <div class="nav-section-title">App Store</div>

                    <!-- iPhone -->
                    <div class="platform-item active" data-platform="iphone">
                        <div class="platform-header">
                            <span class="platform-name">iPhone</span>
                            <span class="screenshot-count" style="display: none;">(0)</span>
                        </div>
                        <div class="platform-sizes">
                            <label class="size-item">
                                <input type="checkbox" data-platform="iphone" data-format="iphone-6.9" checked>
                                <span>6.9"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="iphone" data-format="iphone-6.7" checked>
                                <span>6.7"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="iphone" data-format="iphone-6.5">
                                <span>6.5"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="iphone" data-format="iphone-5.5">
                                <span>5.5"</span>
                            </label>
                        </div>
                    </div>

                    <!-- iPad -->
                    <div class="platform-item" data-platform="ipad">
                        <div class="platform-header">
                            <span class="platform-name">iPad</span>
                            <span class="screenshot-count" style="display: none;">(0)</span>
                        </div>
                        <div class="platform-sizes">
                            <label class="size-item">
                                <input type="checkbox" data-platform="ipad" data-format="ipad-13" checked>
                                <span>13"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="ipad" data-format="ipad-12.9">
                                <span>12.9"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="ipad" data-format="ipad-11">
                                <span>11"</span>
                            </label>
                        </div>
                    </div>

                    <!-- Mac -->
                    <div class="platform-item" data-platform="mac">
                        <div class="platform-header">
                            <span class="platform-name">Mac</span>
                            <span class="screenshot-count" style="display: none;">(0)</span>
                        </div>
                        <div class="platform-sizes">
                            <label class="size-item">
                                <input type="checkbox" data-platform="mac" data-format="mac-2880" checked>
                                <span>2880</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="mac" data-format="mac-1280">
                                <span>1280</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Google Play Store -->
                <div class="nav-section">
                    <div class="nav-section-title">Google Play</div>

                    <!-- Android Phone -->
                    <div class="platform-item" data-platform="android-phone">
                        <div class="platform-header">
                            <span class="platform-name">Phone</span>
                            <span class="screenshot-count" style="display: none;">(0)</span>
                        </div>
                        <div class="platform-sizes">
                            <label class="size-item">
                                <input type="checkbox" data-platform="android-phone" data-format="android-phone-1080" checked>
                                <span>1080p</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="android-phone" data-format="android-phone-1440">
                                <span>1440p</span>
                            </label>
                        </div>
                    </div>

                    <!-- Android Tablet -->
                    <div class="platform-item" data-platform="android-tablet">
                        <div class="platform-header">
                            <span class="platform-name">Tablet</span>
                            <span class="screenshot-count" style="display: none;">(0)</span>
                        </div>
                        <div class="platform-sizes">
                            <label class="size-item">
                                <input type="checkbox" data-platform="android-tablet" data-format="android-tablet-7" checked>
                                <span>7"</span>
                            </label>
                            <label class="size-item">
                                <input type="checkbox" data-platform="android-tablet" data-format="android-tablet-10">
                                <span>10"</span>
                            </label>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-export" id="exportBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export
                </button>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-content">
            <!-- Toolbar -->
            <header class="main-toolbar">
                <div class="toolbar-left">
                    <button class="add-screenshot-btn" id="addScreenshotBtn">
                        <input type="file" id="screenshotInput" multiple accept="image/*" hidden>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Add Screenshots
                    </button>
                </div>
                <div class="toolbar-right">
                    <span class="preview-label">Preview:</span>
                    <select id="formatSelect" class="format-select">
                        <!-- Options generated dynamically based on active platform -->
                    </select>
                </div>
            </header>

            <!-- Zone des previews multiples -->
            <div class="previews-wrapper">
                <div class="previews-container" id="previewsContainer">
                    <!-- Canvases will be generated dynamically -->
                    <div class="empty-state" id="emptyState">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p id="emptyStateText">Drag & drop iPhone screenshots here</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="settings-panel">
            <div class="settings-scroll">
                <!-- Device Position -->
                <section class="settings-section">
                    <div class="section-header">
                        <span class="section-title">Position</span>
                    </div>
                    <div class="section-content">
                        <div class="position-buttons">
                            <button class="position-btn-new active" data-preset="top" title="Screenshot at bottom, text at top">
                                <div class="position-preview">
                                    <div class="position-text-area top"></div>
                                    <div class="position-screenshot-area bottom"></div>
                                </div>
                                <span>Top</span>
                            </button>
                            <button class="position-btn-new" data-preset="center" title="Centered screenshot">
                                <div class="position-preview">
                                    <div class="position-screenshot-area centered"></div>
                                </div>
                                <span>Center</span>
                            </button>
                            <button class="position-btn-new" data-preset="bottom" title="Screenshot at top, text at bottom">
                                <div class="position-preview">
                                    <div class="position-screenshot-area top"></div>
                                    <div class="position-text-area bottom"></div>
                                </div>
                                <span>Bottom</span>
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Title -->
                <section class="settings-section" id="titleSection">
                    <div class="section-header">
                        <span class="section-title">Title</span>
                    </div>
                    <div class="section-content">
                        <input type="text" id="headline" class="text-input" placeholder="Enter title...">
                        <div class="text-options-row">
                            <select id="titleFont" class="font-select">
                                <option value="sf-pro">SF Pro</option>
                                <option value="sf-rounded">SF Rounded</option>
                                <option value="sf-mono">SF Mono</option>
                                <option value="new-york">New York</option>
                                <option value="inter">Inter</option>
                            </select>
                            <div class="size-buttons">
                                <button class="size-btn" data-size="small" data-target="title">S</button>
                                <button class="size-btn active" data-size="medium" data-target="title">M</button>
                                <button class="size-btn" data-size="large" data-target="title">L</button>
                            </div>
                        </div>
                        <div class="text-options-row">
                            <select id="titleWeight" class="font-select">
                                <option value="thin">Thin</option>
                                <option value="regular">Regular</option>
                                <option value="medium">Medium</option>
                                <option value="semibold">Semi-bold</option>
                                <option value="bold" selected>Bold</option>
                            </select>
                            <div class="color-input-wrap">
                                <input type="color" id="titleColor" value="#ffffff">
                                <input type="text" class="color-hex-input" id="titleColorHex" value="#FFFFFF" maxlength="7">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Body -->
                <section class="settings-section" id="bodySection">
                    <div class="section-header">
                        <span class="section-title">Body</span>
                    </div>
                    <div class="section-content">
                        <input type="text" id="subheadline" class="text-input" placeholder="Enter subtitle...">
                        <div class="text-options-row">
                            <select id="bodyFont" class="font-select">
                                <option value="sf-pro">SF Pro</option>
                                <option value="sf-rounded">SF Rounded</option>
                                <option value="sf-mono">SF Mono</option>
                                <option value="new-york">New York</option>
                                <option value="inter">Inter</option>
                            </select>
                            <div class="size-buttons">
                                <button class="size-btn" data-size="small" data-target="body">S</button>
                                <button class="size-btn active" data-size="medium" data-target="body">M</button>
                                <button class="size-btn" data-size="large" data-target="body">L</button>
                            </div>
                        </div>
                        <div class="text-options-row">
                            <select id="bodyWeight" class="font-select">
                                <option value="thin">Thin</option>
                                <option value="regular">Regular</option>
                                <option value="medium" selected>Medium</option>
                                <option value="semibold">Semi-bold</option>
                                <option value="bold">Bold</option>
                            </select>
                            <div class="color-input-wrap">
                                <input type="color" id="bodyColor" value="#ffffff">
                                <input type="text" class="color-hex-input" id="bodyColorHex" value="#FFFFFF" maxlength="7">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Background -->
                <section class="settings-section" id="backgroundSection">
                    <div class="section-header">
                        <span class="section-title">Background</span>
                    </div>
                    <div class="section-content">
                        <div class="color-row">
                            <label class="color-label">Color</label>
                            <div class="color-input-wrap">
                                <input type="color" id="bgColor1" value="#75B7E7">
                                <input type="text" class="color-hex-input" id="bgColor1Hex" value="#75B7E7" maxlength="7">
                            </div>
                        </div>
                        <div class="color-row" id="gradientColorRow" style="display: none;">
                            <label class="color-label">End color</label>
                            <div class="color-input-wrap">
                                <input type="color" id="bgGradientColor" value="#4A90D9">
                                <input type="text" class="color-hex-input" id="bgGradientColorHex" value="#4A90D9" maxlength="7">
                            </div>
                        </div>
                        <div class="color-row">
                            <label class="color-label">Gradient</label>
                            <label class="toggle">
                                <input type="checkbox" id="bgGradient">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- Device Frame -->
                <section class="settings-section" id="deviceFrameSection">
                    <div class="section-header">
                        <span class="section-title">Device Frame</span>
                        <label class="toggle">
                            <input type="checkbox" id="addDeviceFrame" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="section-content" id="deviceFrameContent">
                        <div class="color-row">
                            <label class="color-label">Color</label>
                            <div class="color-input-wrap">
                                <input type="color" id="deviceFrameColor" value="#000000">
                                <input type="text" class="color-hex-input" id="deviceFrameColorHex" value="#000000" maxlength="7">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Shadow -->
                <section class="settings-section">
                    <div class="section-header">
                        <span class="section-title">Shadow</span>
                        <label class="toggle">
                            <input type="checkbox" id="addShadow">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </section>
            </div>

            <!-- Apply to All Button -->
            <div class="settings-footer" id="settingsFooter" style="display: none;">
                <button class="btn-apply-all" id="applyToAllBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72"/>
                        <path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/>
                    </svg>
                    Apply to All
                </button>
            </div>
        </aside>
    </div>

    <!-- Progress Modal -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <div class="spinner"></div>
            <p class="modal-text" id="progressText">Exporting...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/render.js"></script>
    <script src="js/screenshots.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/export.js"></script>
    <script src="js/events.js"></script>
    <script src="app.js"></script>

    <!-- Vercel Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
