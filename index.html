<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screan - App Store & Google Play Screenshot Studio</title>
    <meta name="description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android. Add titles, customize colors, and export all formats at once.">
    <meta name="keywords" content="App Store, Google Play, screenshots, iPhone, iPad, Mac, Android, marketing, ASO">
    <meta name="author" content="Screan">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta property="og:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">
    <meta property="og:site_name" content="Screan">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Screan - App Store & Google Play Screenshot Studio">
    <meta name="twitter:description" content="Create beautiful screenshots for App Store and Google Play. iPhone, iPad, Mac, and Android.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Theme Color -->
    <meta name="theme-color" content="#75B7E7">

    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app">
        <!-- Mini Sidebar (Icons) -->
        <aside class="mini-sidebar">
            <div class="mini-sidebar-top">
                <button class="mini-sidebar-btn" id="togglePanels" title="Toggle panels">
                    <i data-lucide="columns-3"></i>
                </button>
                <button class="mini-sidebar-btn" id="themeToggle" title="Toggle theme">
                    <i data-lucide="moon" class="icon-moon"></i>
                    <i data-lucide="sun" class="icon-sun"></i>
                </button>
            </div>
            <div class="mini-sidebar-bottom">
                <a href="https://buymeacoffee.com/patricecassard" target="_blank" rel="noopener" class="mini-sidebar-btn" title="Buy me a coffee">
                    <i data-lucide="coffee"></i>
                </a>
                <a href="https://x.com/patricecassard" target="_blank" rel="noopener" class="mini-sidebar-btn" title="Follow on X">
                    <i data-lucide="twitter"></i>
                </a>
                <a href="https://github.com/cassardp/Screan#readme" target="_blank" rel="noopener" class="mini-sidebar-btn" title="View on GitHub">
                    <i data-lucide="github"></i>
                </a>
                <span class="version-number">0.59</span>
            </div>
        </aside>

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo_dark.png" alt="Screan" class="app-logo logo-dark">
                <img src="assets/logo_light.png" alt="Screan" class="app-logo logo-light">
            </div>

            <nav class="sidebar-nav">
                <!-- Apple App Store -->
                <div class="nav-section" id="appStoreSection">
                    <div class="nav-section-title">App Store</div>
                </div>

                <div class="nav-section" id="googlePlaySection">
                    <div class="nav-section-title">Google Play</div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-export" id="exportBtn" disabled>
                    <i data-lucide="download"></i>
                    Export
                </button>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-content">
            <!-- Toolbar -->
            <header class="main-toolbar">
                <div class="toolbar-left">
                    <button class="add-screenshot-btn" id="addScreenshotBtn">
                        <input type="file" id="screenshotInput" multiple accept="image/*" hidden>
                        <i data-lucide="plus"></i>
                        Add Screenshots
                    </button>
                </div>
                <div class="toolbar-right">
                    <span class="preview-label">Preview:</span>
                    <select id="formatSelect" class="format-select">
                        <!-- Options generated dynamically based on active platform -->
                    </select>
                    <select id="previewLanguageSelect" class="preview-language-select">
                        <!-- Options synced with languageSelect, visible only when panels hidden -->
                    </select>
                </div>
            </header>

            <!-- Zone des previews multiples -->
            <div class="previews-wrapper">
                <div class="previews-container" id="previewsContainer">
                    <!-- Canvases will be generated dynamically -->
                    <div class="empty-state" id="emptyState">
                        <p id="emptyStateText">Drag & drop iPhone screenshots here</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="settings-panel">
            <!-- Settings Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="style">
                    <i data-lucide="brush"></i>
                    Style
                </button>
                <button class="settings-tab" data-tab="localize">
                    <i data-lucide="languages"></i>
                    Localize
                </button>
            </div>

            <div class="settings-scroll">
                <!-- Style Tab -->
                <div class="settings-tab-content active" id="styleTab">
                    <!-- Text Layout -->
                    <section class="settings-section" id="textLayoutSection">
                        <div class="section-header">
                            <span class="section-title">Layout</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="layout" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="layout-row">
                                <span class="layout-label">Position</span>
                                <div class="position-text-buttons">
                                    <button class="position-text-btn active" data-preset="top" title="Top">
                                        <i data-lucide="arrow-up-to-line"></i>
                                    </button>
                                    <button class="position-text-btn" data-preset="center" title="Center">
                                        <i data-lucide="rectangle-vertical"></i>
                                    </button>
                                    <button class="position-text-btn" data-preset="bottom" title="Bottom">
                                        <i data-lucide="arrow-down-to-line"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="layout-row" id="spacingRow">
                                <span class="layout-label">Spacing</span>
                                <div class="slider-container">
                                    <input type="range" id="spacingSlider" class="range-slider" min="0" max="100" value="33" step="1">
                                </div>
                            </div>
                            <div class="layout-row" id="alignRow">
                                <span class="layout-label">Align</span>
                                <div class="align-buttons" id="alignButtons">
                                    <button class="align-btn" data-align="left" title="Align left">
                                        <i data-lucide="align-left"></i>
                                    </button>
                                    <button class="align-btn active" data-align="center" title="Align center">
                                        <i data-lucide="align-center"></i>
                                    </button>
                                    <button class="align-btn" data-align="right" title="Align right">
                                        <i data-lucide="align-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Title -->
                    <section class="settings-section" id="titleSection">
                        <div class="section-header">
                            <span class="section-title">Title</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="title" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <textarea id="headline" class="text-input title-area" placeholder="Enter title..." rows="2"></textarea>
                            <div class="text-options-row">
                                <select id="titleFont" class="font-select">
                                    <option value="sf-pro">SF Pro</option>
                                    <option value="sf-rounded">SF Rounded</option>
                                    <option value="sf-mono">SF Mono</option>
                                    <option value="new-york">New York</option>
                                    <option value="inter">Inter</option>
                                </select>
                                <div class="size-buttons">
                                    <button class="size-btn" data-size="small" data-target="title">S</button>
                                    <button class="size-btn active" data-size="medium" data-target="title">M</button>
                                    <button class="size-btn" data-size="large" data-target="title">L</button>
                                </div>
                            </div>
                            <div class="text-options-row">
                                <select id="titleWeight" class="font-select">
                                    <option value="thin">Thin</option>
                                    <option value="regular">Regular</option>
                                    <option value="medium">Medium</option>
                                    <option value="semibold">Semi-bold</option>
                                    <option value="bold" selected>Bold</option>
                                </select>
                                <div class="color-input-wrap">
                                    <input type="color" id="titleColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="titleColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Body -->
                    <section class="settings-section" id="bodySection">
                        <div class="section-header">
                            <span class="section-title">Body</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="body" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <textarea id="subheadline" class="text-input text-area" placeholder="Enter subtitle..." rows="2"></textarea>
                            <div class="text-options-row">
                                <select id="bodyFont" class="font-select">
                                    <option value="sf-pro">SF Pro</option>
                                    <option value="sf-rounded">SF Rounded</option>
                                    <option value="sf-mono">SF Mono</option>
                                    <option value="new-york">New York</option>
                                    <option value="inter">Inter</option>
                                </select>
                                <div class="size-buttons">
                                    <button class="size-btn" data-size="small" data-target="body">S</button>
                                    <button class="size-btn active" data-size="medium" data-target="body">M</button>
                                    <button class="size-btn" data-size="large" data-target="body">L</button>
                                </div>
                            </div>
                            <div class="text-options-row">
                                <select id="bodyWeight" class="font-select">
                                    <option value="thin">Thin</option>
                                    <option value="regular">Regular</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="semibold">Semi-bold</option>
                                    <option value="bold">Bold</option>
                                </select>
                                <div class="color-input-wrap">
                                    <input type="color" id="bodyColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="bodyColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Background -->
                    <section class="settings-section" id="backgroundSection">
                        <div class="section-header">
                            <span class="section-title">Background</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="background" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="color-row">
                                <label class="color-label">Color</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="bgColor1" value="#75B7E7">
                                    <input type="text" class="color-hex-input" id="bgColor1Hex" value="#75B7E7" maxlength="7">
                                </div>
                            </div>
                            <div class="color-row" id="gradientColorRow" style="display: none;">
                                <label class="color-label">End color</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="bgGradientColor" value="#ffffff">
                                    <input type="text" class="color-hex-input" id="bgGradientColorHex" value="#FFFFFF" maxlength="7">
                                </div>
                            </div>
                            <div class="color-row">
                                <label class="color-label">Gradient</label>
                                <label class="toggle">
                                    <input type="checkbox" id="bgGradient">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </section>

                    <!-- Device Frame -->
                    <section class="settings-section" id="deviceFrameSection">
                        <div class="section-header">
                            <span class="section-title">Device</span>
                            <span class="section-header-spacer"></span>
                            <button class="btn-apply-section" data-section="device" title="Apply to all">
                                <i data-lucide="arrow-right-left"></i>
                            </button>
                        </div>
                        <div class="section-content">
                            <div class="color-row">
                                <label class="color-label">Show border</label>
                                <label class="toggle">
                                    <input type="checkbox" id="addDeviceFrame" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="color-row" id="deviceFrameColorRow">
                                <label class="color-label">Frame color</label>
                                <div class="color-input-wrap">
                                    <input type="color" id="deviceFrameColor" value="#000000">
                                    <input type="text" class="color-hex-input" id="deviceFrameColorHex" value="#000000" maxlength="7">
                                </div>
                            </div>
                            <div class="color-row">
                                <label class="color-label">Display shadow</label>
                                <label class="toggle">
                                    <input type="checkbox" id="addShadow">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- Localize Tab -->
                <div class="settings-tab-content" id="localizeTab">
                    <section class="settings-section" id="translationSection">
                        <div class="section-header">
                            <span class="section-title">API Key</span>
                        </div>
                        <div class="section-content">
                            <div class="api-key-row" id="apiKeyRow">
                                <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Claude API Key (local use only)">
                                <button class="api-key-toggle" id="apiKeyToggle" type="button" title="Show/Hide API key">
                                    <i data-lucide="eye" class="icon-show"></i>
                                    <i data-lucide="eye-off" class="icon-hide"></i>
                                </button>
                            </div>
                        </div>
                    </section>

                    <section class="settings-section" id="languageSection">
                        <div class="section-header">
                            <span class="section-title">Languages</span>
                        </div>
                        <div class="section-content">
                            <div class="language-list" id="activeLanguages">
                                <!-- Populated dynamically by localize.js -->
                            </div>
                        </div>
                    </section>

                    <section class="settings-section" id="addLanguageSection">
                        <div class="section-header">
                            <span class="section-title">Add language</span>
                        </div>
                        <div class="section-content">
                            <div class="add-language-row" id="addLanguageRow">
                                <select id="availableLanguagesSelect" class="font-select">
                                    <!-- Populated dynamically by localize.js -->
                                </select>
                                <button class="add-lang-btn" id="addLangBtn" title="Add">
                                    <i data-lucide="plus"></i>
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Hidden select for preview toolbar sync -->
                    <select id="languageSelect" class="font-select language-select" style="display: none;">
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <!-- Footer Buttons -->
            <div class="settings-footer" id="translateFooter" style="display: none;">
                <button class="btn-apply-all" id="translateAllBtn" disabled>
                    <i data-lucide="wand-sparkles"></i>
                    Translate All
                </button>
            </div>
        </aside>
    </div>

    <!-- Progress Modal -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-content">
            <div class="spinner"></div>
            <p class="modal-text" id="progressText">Exporting...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/render.js"></script>
    <script src="js/screenshots.js"></script>
    <script src="js/reorder.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/export.js"></script>
    <script src="js/localize.js"></script>
    <script src="js/ai-translate.js"></script>
    <script src="js/events.js"></script>
    <script src="app.js"></script>

    <!-- Vercel Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
